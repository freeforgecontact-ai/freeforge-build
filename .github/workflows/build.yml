name: build-freeforge
on:
  push: { branches: [main] }
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [affaires, dev, finances, etudes, sante, studio, gamers, quotidien, voyage]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: android-actions/setup-android@v3
      - name: Scaffold Capacitor project
        run: node tooling/scaffold.mjs ${{ matrix.app }} android build-${{ matrix.app }}
      - name: Build APK (debug)
        run: |
          cd build-${{ matrix.app }}
          npm install
          npx cap add android
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: freeforge-${{ matrix.app }}-android
          path: build-${{ matrix.app }}/android/app/build/outputs/apk/debug/app-debug.apk
      - name: Rename APK
        run: cp build-${{ matrix.app }}/android/app/build/outputs/apk/debug/app-debug.apk freeforge-${{ matrix.app }}.apk
      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-${{ matrix.app }}
          files: freeforge-${{ matrix.app }}.apk
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        app: [affaires, dev, finances, etudes, sante, studio, gamers, quotidien, voyage]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Scaffold Electron project
        run: node tooling/scaffold.mjs ${{ matrix.app }} electron build-${{ matrix.app }}
      - name: Build desktop installer
        run: |
          cd build-${{ matrix.app }}
          npm install
          npm run dist
      - uses: actions/upload-artifact@v4
        with:
          name: freeforge-${{ matrix.app }}-${{ matrix.os }}
          path: |
            build-${{ matrix.app }}/dist/*.exe
            build-${{ matrix.app }}/dist/*.dmg
            build-${{ matrix.app }}/dist/*.AppImage
      - name: Rename desktop installer
        shell: bash
        run: |
          cd build-${{ matrix.app }}/dist
          case "${{ matrix.os }}" in
            windows-latest) f=$(ls *.exe 2>/dev/null | head -1); out=freeforge-${{ matrix.app }}-windows.exe;;
            macos-latest)   f=$(ls *.dmg 2>/dev/null | head -1); out=freeforge-${{ matrix.app }}-mac.dmg;;
            ubuntu-latest)  f=$(ls *.AppImage 2>/dev/null | head -1); out=freeforge-${{ matrix.app }}-linux.AppImage;;
          esac
          cp "$f" "$GITHUB_WORKSPACE/$out"
      - name: Publish desktop to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-${{ matrix.app }}
          files: freeforge-${{ matrix.app }}-*
